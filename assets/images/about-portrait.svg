<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="Digital Ops Systems — Professional portrait">
<defs>

  <pattern id="pdots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.65" fill="#0D1B2A" opacity="0.06"/>
  </pattern>

  <radialGradient id="bgGlow" cx="50%" cy="62%" r="52%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#E6EBF4"/>
    <stop offset="100%" stop-color="#F5F6FA"/>
  </radialGradient>

  <radialGradient id="skinGrad" cx="38%" cy="30%" r="62%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#E2BA92"/>
    <stop offset="70%"  stop-color="#CC9660"/>
    <stop offset="100%" stop-color="#C08E56"/>
  </radialGradient>

  <radialGradient id="skinNeck" cx="50%" cy="20%" r="60%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#D4A872"/>
    <stop offset="100%" stop-color="#C08E56"/>
  </radialGradient>

  <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#162C42"/>
    <stop offset="100%" stop-color="#0D1B2A"/>
  </linearGradient>

  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="28" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="cardShadow" x="-8%" y="-6%" width="116%" height="118%">
    <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0D1B2A" flood-opacity="0.11"/>
  </filter>

</defs>

<!-- ── Background ───────────────────────────────────────── -->
<rect width="400" height="500" fill="url(#bgGlow)"/>
<rect width="400" height="500" fill="url(#pdots)"/>

<!-- Gold top accent bar -->
<rect x="0" y="0" width="400" height="3" fill="#C9A84C"/>

<!-- Soft halo / stage light behind figure -->
<ellipse cx="200" cy="320" rx="195" ry="195" fill="#0D1B2A" opacity="0.030" filter="url(#glow)"/>
<ellipse cx="200" cy="310" rx="145" ry="145" fill="#0D1B2A" opacity="0.022"/>

<!-- ── Brand mark (top-right watermark) ─────────────────── -->
<g transform="translate(348,18)" opacity="0.30">
  <circle cx="10" cy="10" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="18" cy="10" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="26" cy="10" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="10" cy="18" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="18" cy="18" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="26" cy="18" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="10" cy="26" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="18" cy="26" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <circle cx="26" cy="26" r="1.15" fill="#0D1B2A" opacity="0.45"/>
  <line x1="10" y1="10" x2="26" y2="10" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="10" x2="26" y2="26" stroke="#0D1B2A" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="10" cy="10" r="3.5" fill="#C9A84C"/>
  <circle cx="26" cy="10" r="2.8" fill="#0D1B2A"/>
  <circle cx="26" cy="26" r="2.8" fill="#0D1B2A"/>
</g>

<!-- ── Suit / Body ─────────────────────────────────────── -->

<!-- Main jacket body -->
<path d="
  M 44 500
  L 52 310
  Q 72 265 128 252
  L 168 244
  L 174 276
  L 200 292
  L 226 276
  L 232 244
  L 272 252
  Q 328 265 348 310
  L 356 500 Z
" fill="url(#suitGrad)"/>

<!-- Left lapel -->
<path d="
  M 168 244
  L 143 256
  Q 114 268 104 290
  L 163 316
  L 174 276 Z
" fill="#1D3550"/>

<!-- Right lapel -->
<path d="
  M 232 244
  L 257 256
  Q 286 268 296 290
  L 237 316
  L 226 276 Z
" fill="#1D3550"/>

<!-- Jacket shadow / depth on shoulders -->
<path d="M 52 310 Q 72 265 128 252 L 168 244 L 158 260 Q 110 272 90 310 Z" fill="#0D1B2A" opacity="0.18"/>
<path d="M 348 310 Q 328 265 272 252 L 232 244 L 242 260 Q 290 272 310 310 Z" fill="#0D1B2A" opacity="0.18"/>

<!-- Lapel fold crease lines -->
<line x1="164" y1="249" x2="166" y2="310" stroke="#0D1B2A" stroke-width="0.8" opacity="0.28"/>
<line x1="236" y1="249" x2="234" y2="310" stroke="#0D1B2A" stroke-width="0.8" opacity="0.28"/>

<!-- White shirt / chest visible between lapels -->
