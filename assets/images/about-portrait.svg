  Q 269 210 270 200
  Q 269 190 265 184 Z
" fill="#C08056"/>
<path d="M 270 194 Q 272 200 270 206" stroke="#A86840" stroke-width="1.3" fill="none" opacity="0.45"/>

<!-- ── Face Features ─────────────────────────────────────── -->

<!-- Forehead highlight (light bounce) -->
<ellipse cx="200" cy="160" rx="32" ry="18" fill="#FFFFFF" opacity="0.06"/>

<!-- Eyebrows — strong, confident -->
<path d="M 165 169 Q 178 162 196 165" stroke="#28200E" stroke-width="3.2" fill="none" stroke-linecap="round"/>
<path d="M 204 165 Q 222 162 235 169" stroke="#28200E" stroke-width="3.2" fill="none" stroke-linecap="round"/>

<!-- Brow highlight -->
<path d="M 166 170 Q 179 164 194 167" stroke="#40300A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>
<path d="M 206 167 Q 221 164 234 170" stroke="#40300A" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.3"/>

<!-- ── Eyes ── -->
<!-- Left eye white -->
<ellipse cx="180" cy="187" rx="14.5" ry="10" fill="#FAFCFF"/>
