<!-- Left gold accent pillar -->
<rect x="18" y="105" width="3" height="100" rx="1.5" fill="#C9A84C" opacity="0.45"/>
<circle cx="19.5" cy="104" r="3.8" fill="#C9A84C" opacity="0.45"/>
<circle cx="19.5" cy="205" r="3.8" fill="#C9A84C" opacity="0.45"/>

<!-- Right subtle accent -->
