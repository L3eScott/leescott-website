<!-- Main head shape -->
<ellipse cx="200" cy="194" rx="66" ry="75" fill="url(#skinGrad)"/>

<!-- Jawline / chin highlight -->
<path d="M 152 228 Q 155 265 200 275 Q 245 265 248 228" fill="none" stroke="#B87848" stroke-width="0.8" opacity="0.12"/>

<!-- ── Hair ──────────────────────────────────────────────── -->

<!-- Main hair -->
