  L 163 316
  L 200 330
  L 237 316
  L 226 276
  L 213 284
  L 200 292
  L 187 284 Z
" fill="#F4F7FB"/>

<!-- Shirt button placket -->
<line x1="200" y1="295" x2="200" y2="500" stroke="#DDE3ED" stroke-width="1.5" opacity="0.6"/>
<circle cx="200" cy="350" r="2.8" fill="#CDD4E0" opacity="0.6"/>
<circle cx="200" cy="374" r="2.8" fill="#CDD4E0" opacity="0.6"/>
<circle cx="200" cy="398" r="2.8" fill="#CDD4E0" opacity="0.6"/>

<!-- Shirt collar wings -->
<path d="M 174 276 L 187 268 L 200 280 L 187 284 Z" fill="#F4F7FB"/>
<path d="M 226 276 L 213 268 L 200 280 L 213 284 Z" fill="#F4F7FB"/>

<!-- Gold tie -->
<path d="
  M 196 274
  L 191 325
  L 200 344
  L 209 325
  L 204 274
