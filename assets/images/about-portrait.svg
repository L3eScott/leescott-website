<path d="M 197.5 279 Q 200 282 202.5 279" stroke="#B08030" stroke-width="0.8" fill="none" opacity="0.5"/>

<!-- Pocket square -->
<path d="M 250 302 L 258 293 L 268 299 L 276 291 L 281 305 L 250 305 Z" fill="#C9A84C" opacity="0.82"/>
<rect x="250" y="305" width="31" height="16" rx="1" fill="#1D3550"/>

