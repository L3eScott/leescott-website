<ellipse cx="181" cy="188" rx="8.5" ry="8.5" fill="#2B4870"/>
<!-- Left pupil -->
<ellipse cx="181" cy="188" rx="5" ry="5" fill="#0E1420"/>
<!-- Left eye light spec -->
<circle cx="184.5" cy="185" r="2.8" fill="#FFFFFF" opacity="0.88"/>
<circle cx="178" cy="191" r="1.2" fill="#FFFFFF" opacity="0.3"/>
<!-- Left upper eyelid -->
<path d="M 165 187 Q 181 178 196 187" stroke="#50301A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
<!-- Left lower eyelid -->
<path d="M 166 188 Q 181 196 196 188" stroke="#50301A" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.45"/>
<!-- Left lashes hint -->
<path d="M 165 187 L 162 183" stroke="#28200A" stroke-width="1.2" stroke-linecap="round"/>
<path d="M 170 182 L 168 178" stroke="#28200A" stroke-width="1.1" stroke-linecap="round"/>
<path d="M 176 180 L 175 176" stroke="#28200A" stroke-width="1.1" stroke-linecap="round"/>

<!-- Right eye white -->
<ellipse cx="220" cy="187" rx="14.5" ry="10" fill="#FAFCFF"/>
<!-- Right iris -->
<ellipse cx="219" cy="188" rx="8.5" ry="8.5" fill="#2B4870"/>
<!-- Right pupil -->
<ellipse cx="219" cy="188" rx="5" ry="5" fill="#0E1420"/>
<!-- Right eye light spec -->
<circle cx="222.5" cy="185" r="2.8" fill="#FFFFFF" opacity="0.88"/>
<circle cx="216" cy="191" r="1.2" fill="#FFFFFF" opacity="0.3"/>
<!-- Right upper eyelid -->
<path d="M 205 187 Q 219 178 234 187" stroke="#50301A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
<!-- Right lower eyelid -->
<path d="M 204 188 Q 219 196 234 188" stroke="#50301A" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.45"/>
<!-- Right lashes hint -->
<path d="M 234 187 L 237 183" stroke="#28200A" stroke-width="1.2" stroke-linecap="round"/>
<path d="M 230 181 L 232 177" stroke="#28200A" stroke-width="1.1" stroke-linecap="round"/>
<path d="M 224 179 L 225 175" stroke="#28200A" stroke-width="1.1" stroke-linecap="round"/>

<!-- Nose bridge -->
<path d="M 198 195 L 196 209" stroke="#C0804A" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.22"/>
<path d="M 202 195 L 204 209" stroke="#C0804A" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.22"/>

<!-- Nose base -->
<path d="M 193 214 Q 200 219 207 214" fill="none" stroke="#B07840" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
<!-- Nostrils -->
<ellipse cx="193" cy="215" rx="5.5" ry="3.5" fill="#B07840" opacity="0.22"/>
<ellipse cx="207" cy="215" rx="5.5" ry="3.5" fill="#B07840" opacity="0.22"/>

<!-- Philtrum (upper lip groove) -->
<path d="M 197 221 L 200 226 L 203 221" fill="none" stroke="#B07840" stroke-width="0.8" opacity="0.25"/>

<!-- ── Mouth — confident, warm, professional smile ── -->
<!-- Lips -->
<path d="M 182 234 Q 191 228 200 230 Q 209 228 218 234 Q 209 238 200 237 Q 191 238 182 234 Z" fill="#C48060" opacity="0.55"/>
<path d="M 183 234 Q 200 245 217 234 Q 200 248 183 234 Z" fill="#B87050" opacity="0.32"/>
