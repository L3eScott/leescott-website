<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
<defs>
  <pattern id="dotgrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#0D1B2A" opacity="0.055"/>
  </pattern>
  <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#0D1B2A" flood-opacity="0.09"/>
  </filter>
  <filter id="shadow-lg" x="-6%" y="-5%" width="112%" height="118%">
    <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0D1B2A" flood-opacity="0.14"/>
  </filter>
</defs>

