<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
<!--
  DIGITAL OPS SYSTEMS — Social Media Square Template
  Canvas: 1080 × 1080 px  |  Instagram · LinkedIn · Facebook
  ─────────────────────────────────────────────────────────────
  HOW TO EDIT:
  1. Replace the three <text> headline lines (marked HEADLINE)
  2. Replace the two <text> subtext lines (marked SUBTEXT)
  3. Keep all other elements — logo, footer, accents — unchanged

  FONT: Inter (700 / 800 weight). Fallback: Helvetica Neue, Arial.
  Load Inter before screenshotting: https://fonts.google.com/specimen/Inter
  ─────────────────────────────────────────────────────────────
-->
<defs>
  <pattern id="sdots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.85" fill="#0D1B2A" opacity="0.045"/>
  </pattern>
</defs>

<!-- ── Background ──────────────────────────────────────────── -->
<rect width="1080" height="1080" fill="#FFFFFF"/>
<rect width="1080" height="1080" fill="url(#sdots)"/>

<!-- Decorative arc — bottom right, very subtle -->
<circle cx="1100" cy="1100" r="460" fill="none" stroke="#0D1B2A" stroke-width="1.5" opacity="0.04"/>
<circle cx="1100" cy="1100" r="340" fill="none" stroke="#C9A84C"  stroke-width="1"   opacity="0.04"/>

<!-- ── Accent Bars ─────────────────────────────────────────── -->
<!-- Gold top bar -->
<rect x="0" y="0" width="1080" height="8" fill="#C9A84C"/>
<!-- Navy left bar -->
<rect x="0" y="8" width="8" height="928" fill="#0D1B2A"/>

<!-- ── Ghost brand mark — top right ───────────────────────── -->
<g transform="translate(758,38) scale(7.5)" opacity="0.038" fill="#0D1B2A" stroke="#0D1B2A">
  <circle cx="10" cy="10" r="1.4"/>
  <circle cx="20" cy="10" r="1.4"/>
  <circle cx="30" cy="10" r="1.4"/>
  <circle cx="10" cy="20" r="1.4"/>
  <circle cx="20" cy="20" r="1.4"/>
  <circle cx="30" cy="20" r="1.4"/>
  <circle cx="10" cy="30" r="1.4"/>
  <circle cx="20" cy="30" r="1.4"/>
  <circle cx="30" cy="30" r="1.4"/>
  <line x1="10" y1="10" x2="30" y2="10" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <line x1="30" y1="10" x2="30" y2="30" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <circle cx="10" cy="10" r="4.5"/>
  <circle cx="30" cy="10" r="3.5"/>
  <circle cx="30" cy="30" r="3.5"/>
</g>

<!-- ── Brand Label ─────────────────────────────────────────── -->
<text
  x="88" y="116"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="23" font-weight="700" fill="#C9A84C"
  letter-spacing="5">DIGITAL OPS SYSTEMS</text>
<line x1="88" y1="130" x2="430" y2="130" stroke="#C9A84C" stroke-width="1.5" opacity="0.35"/>

<!-- ── HEADLINE — edit these three lines ──────────────────── -->
<text
  x="88" y="312"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="92" font-weight="800" fill="#0D1B2A">Is Your Website</text>

<text
  x="88" y="424"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="92" font-weight="800" fill="#0D1B2A">Actually Working</text>

<!-- Third line uses gold for emphasis — keep or change fill to #0D1B2A -->
<text
  x="88" y="536"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="92" font-weight="800" fill="#C9A84C">For You?</text>

<!-- ── Gold rule ────────────────────────────────────────────── -->
<rect x="88" y="582" width="540" height="3" rx="1.5" fill="#C9A84C"/>

<!-- ── SUBTEXT — edit these two lines ─────────────────────── -->
<text
  x="88" y="650"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="37" font-weight="400" fill="#0D1B2A" opacity="0.52">Most small business websites sit idle.</text>

<text
  x="88" y="700"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="37" font-weight="400" fill="#0D1B2A" opacity="0.52">We build yours to capture leads, 24/7.</text>

<!-- ── Footer ─────────────────────────────────────────────── -->
<!-- Gold divider -->
<rect x="0" y="936" width="1080" height="4" fill="#C9A84C"/>
<!-- Navy band -->
<rect x="0" y="940" width="1080" height="140" fill="#0D1B2A"/>

<!-- Logo mark (white/gold) in footer -->
<g transform="translate(60,960) scale(1.5)">
  <circle cx="10" cy="10" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="20" cy="10" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="30" cy="10" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="10" cy="20" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="20" cy="20" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="30" cy="20" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="10" cy="30" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="20" cy="30" r="1.4" fill="#ffffff" opacity="0.14"/>
  <circle cx="30" cy="30" r="1.4" fill="#ffffff" opacity="0.14"/>
  <line x1="10" y1="10" x2="30" y2="10" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="10" x2="30" y2="30" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="10" cy="10" r="4.5" fill="#C9A84C"/>
  <circle cx="30" cy="10" r="3.5" fill="#ffffff"/>
  <circle cx="30" cy="30" r="3.5" fill="#ffffff"/>
</g>

<!-- Wordmark in footer -->
<text
  x="148" y="992"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="28" font-weight="700" fill="#ffffff"
  letter-spacing="2">DIGITAL OPS</text>
<text
  x="149" y="1018"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="16" font-weight="500" fill="#C9A84C"
  letter-spacing="6">SYSTEMS</text>

<!-- Vertical divider in footer -->
<line x1="380" y1="958" x2="380" y2="1072" stroke="#C9A84C" stroke-width="1" opacity="0.22"/>

<!-- URL right side -->
<text
  x="1020" y="1006"
  text-anchor="end"
  font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
  font-size="25" font-weight="400" fill="#ffffff" opacity="0.5">digitalopsystems.com</text>

</svg>
