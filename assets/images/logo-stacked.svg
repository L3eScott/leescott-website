<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 94" fill="none" role="img" aria-label="Digital Ops Systems">

  <!-- ── Icon mark (centered) ───────────────── -->
  <g transform="translate(59, 4)">

    <!-- Grid background dots -->
    <circle cx="10" cy="10" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="20" cy="10" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="30" cy="10" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="10" cy="20" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="20" cy="20" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="30" cy="20" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="10" cy="30" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="20" cy="30" r="1.4" fill="#0D1B2A" opacity="0.18"/>
    <circle cx="30" cy="30" r="1.4" fill="#0D1B2A" opacity="0.18"/>

    <!-- Path lines -->
    <line x1="10" y1="10" x2="30" y2="10" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="30" y1="10" x2="30" y2="30" stroke="#0D1B2A" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Nodes -->
    <circle cx="10" cy="10" r="4.5" fill="#C9A84C"/>
    <circle cx="30" cy="10" r="3.5" fill="#0D1B2A"/>
    <circle cx="30" cy="30" r="3.5" fill="#0D1B2A"/>

  </g>

  <!-- ── Gold rule ──────────────────────────── -->
  <line x1="44" y1="52" x2="114" y2="52" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>

  <!-- ── Wordmark ───────────────────────────── -->
  <text
    x="79" y="68"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="16" font-weight="700" fill="#0D1B2A"
    letter-spacing="2">DIGITAL OPS</text>

  <text
    x="79" y="83"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="9" font-weight="500" fill="#C9A84C"
    letter-spacing="5">SYSTEMS</text>

</svg>
