<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="Digital Ops Systems icon">

  <!-- Subtle grid background: 3×3 node field -->
  <circle cx="10" cy="10" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="20" cy="10" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="30" cy="10" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="10" cy="20" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="20" cy="20" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="30" cy="20" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="10" cy="30" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="20" cy="30" r="1.5" fill="#0D1B2A" opacity="0.18"/>
  <circle cx="30" cy="30" r="1.5" fill="#0D1B2A" opacity="0.18"/>

  <!-- Active path: horizontal gold, vertical navy — forms a right-angle "ops flow" -->
  <line x1="10" y1="10" x2="30" y2="10" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="10" x2="30" y2="30" stroke="#0D1B2A" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Key nodes: gold entry, navy pivot, navy endpoint -->
  <circle cx="10" cy="10" r="4.5" fill="#C9A84C"/>
  <circle cx="30" cy="10" r="3.5" fill="#0D1B2A"/>
  <circle cx="30" cy="30" r="3.5" fill="#0D1B2A"/>

</svg>
