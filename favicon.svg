<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Digital Ops Systems — Favicon
    32 × 32 viewBox · scales to 16, 32, 48, 64 px
    Navy #0D1B2A · Gold #C9A84C · White #FFFFFF
  -->

  <!-- Navy rounded background -->
  <rect width="32" height="32" rx="5" fill="#0D1B2A"/>

  <!-- Subtle grid mid-points (brand texture) -->
  <circle cx="16" cy="8"  r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="8"  cy="16" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="16" cy="16" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="24" cy="16" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="8"  cy="24" r="0.8" fill="#ffffff" opacity="0.12"/>
  <circle cx="16" cy="24" r="0.8" fill="#ffffff" opacity="0.12"/>

  <!-- Gold horizontal arm: entry → pivot -->
  <line x1="8" y1="8" x2="24" y2="8"
        stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>

  <!-- White vertical arm: pivot → endpoint -->
  <line x1="24" y1="8" x2="24" y2="24"
        stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Entry node — gold, largest (brand origin point) -->
  <circle cx="8"  cy="8"  r="4"   fill="#C9A84C"/>

  <!-- Pivot node — white -->
  <circle cx="24" cy="8"  r="3"   fill="#ffffff"/>

  <!-- Endpoint node — white -->
  <circle cx="24" cy="24" r="3"   fill="#ffffff"/>

</svg>
